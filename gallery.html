<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Gallery — Luminary Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060a;--surface:#0f0e12;--surface2:#18161e;--surface3:#201d28;--gold:#c9a84c;--gold-l:#e8c97e;--gold-d:#7a6130;--cream:#f0ead6;--muted:#5a5040;--violet:#7b5ea7;--violet-l:#a87fd4;--teal:#2a9a8a;--teal-l:#4dc9b4;--nav:58px;--ease:cubic-bezier(.25,.46,.45,.94);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}body{background:var(--bg);color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:18px;line-height:1.8;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}button{cursor:pointer;font-family:inherit;}img{display:block;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
@keyframes revealScale{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
@keyframes lightboxIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}

.rev{opacity:0}.rev.in{animation:fadeUp .65s var(--ease) forwards;}
.rev-s{opacity:0}.rev-s.in{animation:revealScale .6s var(--ease) forwards;}
.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}.d4{animation-delay:.24s}

.section-label{font-family:'Josefin Sans',sans-serif;font-size:.62rem;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);opacity:.9;}
.gold-line{width:48px;height:1px;background:linear-gradient(to right,var(--gold),transparent);margin:1rem 0;}

/* NAV — identical across all pages */
nav{position:fixed;top:0;left:0;right:0;z-index:500;height:var(--nav);display:flex;align-items:center;justify-content:space-between;padding:0 3rem;background:rgba(6,6,10,.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,168,76,.12);}
.nav-logo{font-family:'Playfair Display SC',serif;font-size:.88rem;letter-spacing:.38em;color:var(--gold);}.nav-logo span{color:var(--cream);}
.nav-links{display:flex;gap:1.8rem;list-style:none;align-items:center;}
.nav-links a{font-family:'Josefin Sans',sans-serif;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,234,214,.5);transition:color .25s;position:relative;padding-bottom:3px;}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width .3s;}
.nav-links a:hover,.nav-links a.active{color:var(--gold);}.nav-links a:hover::after,.nav-links a.active::after{width:100%;}
.nav-cta{font-family:'Josefin Sans',sans-serif;font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;padding:.5rem 1.2rem;border:1px solid rgba(201,168,76,.4);color:var(--gold);transition:all .3s;background:rgba(201,168,76,.06);}.nav-cta:hover{background:var(--gold);color:var(--bg);}
.nav-hamburger{display:none;flex-direction:column;justify-content:space-between;width:26px;height:18px;background:none;border:none;cursor:pointer;padding:0;}
.nav-hamburger span{display:block;width:100%;height:2px;background:var(--gold);border-radius:1px;transition:all .3s;}
.nav-hamburger.open span:nth-child(1){transform:translateY(8px) rotate(45deg);}.nav-hamburger.open span:nth-child(2){opacity:0;}.nav-hamburger.open span:nth-child(3){transform:translateY(-8px) rotate(-45deg);}
.nav-overlay{display:none;position:fixed;inset:0;background:rgba(6,6,10,.7);z-index:490;backdrop-filter:blur(2px);}.nav-overlay.open{display:block;}
.nav-studio-mobile{display:none;}

/* PAGE HERO */
.page-hero{padding:12rem 4rem 5rem;position:relative;overflow:hidden;}
.page-hero::after{content:'';position:absolute;bottom:0;left:4rem;right:4rem;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);}
.page-hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 70% at 75% 30%,rgba(201,168,76,.05) 0%,transparent 60%);}
.page-hero h1{font-family:'Playfair Display SC',serif;font-size:clamp(2.5rem,5.5vw,5rem);font-weight:400;color:var(--cream);position:relative;z-index:2;animation:fadeUp .9s ease forwards;}
.page-hero p.sub{font-size:1.05rem;font-style:italic;color:rgba(240,234,214,.45);max-width:520px;margin-top:.9rem;position:relative;z-index:2;animation:fadeUp .9s ease .2s forwards;opacity:0;}

/* FILTER BAR */
.gallery-top{position:sticky;top:var(--nav);z-index:100;background:var(--surface);border-bottom:1px solid rgba(201,168,76,.1);padding:1.2rem 4rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;}
.gallery-search{background:rgba(240,234,214,.04);border:1px solid rgba(201,168,76,.2);color:var(--cream);padding:.6rem 1.2rem;font-family:'Josefin Sans',sans-serif;font-size:.63rem;letter-spacing:.12em;outline:none;transition:border-color .3s;min-width:220px;}
.gallery-search::placeholder{color:rgba(240,234,214,.3);}.gallery-search:focus{border-color:var(--gold);}
.filter-chip{font-family:'Josefin Sans',sans-serif;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;padding:.4rem 1rem;border:1px solid rgba(201,168,76,.18);color:var(--muted);background:transparent;transition:all .25s;}
.filter-chip:hover,.filter-chip.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.07);}
.view-btns{margin-left:auto;display:flex;gap:.3rem;}
.view-btn{width:32px;height:32px;border:1px solid rgba(201,168,76,.2);background:transparent;color:var(--muted);font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .25s;}
.view-btn.active,.view-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08);}
.results-count{font-family:'Josefin Sans',sans-serif;font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}

/* GRID */
.gallery-grid{padding:3rem 4rem;display:grid;grid-template-columns:repeat(4,1fr);gap:1.4rem;}
.gallery-grid.masonry{columns:4;column-gap:1.2rem;display:block;}
.gallery-item{position:relative;overflow:hidden;cursor:pointer;background:var(--surface2);transition:transform .3s var(--ease);}
.gallery-grid.masonry .gallery-item{break-inside:avoid;margin-bottom:1.2rem;}
.gallery-item:hover{transform:translateY(-3px);}
.gallery-grid:not(.masonry) .gallery-item img{height:260px;object-fit:cover;}
.gallery-grid.masonry .gallery-item img{height:auto;}
.gallery-item img{width:100%;filter:brightness(.72) saturate(.75);transition:transform .55s var(--ease),filter .4s;}
.gallery-item:hover img{transform:scale(1.07);filter:brightness(.92) saturate(1.05);}
.gallery-item-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,10,.95) 0%,transparent 50%);display:flex;flex-direction:column;justify-content:flex-end;padding:1.2rem;opacity:0;transition:opacity .3s;}
.gallery-item:hover .gallery-item-overlay{opacity:1;}
.gi-title{font-family:'Playfair Display SC',serif;font-size:.9rem;color:var(--cream);}
.gi-artist{font-family:'Josefin Sans',sans-serif;font-size:.54rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
.gi-year{font-family:'Josefin Sans',sans-serif;font-size:.52rem;letter-spacing:.14em;color:rgba(240,234,214,.4);}
.gi-badge{position:absolute;top:.8rem;left:.8rem;font-family:'Josefin Sans',sans-serif;font-size:.48rem;letter-spacing:.16em;text-transform:uppercase;padding:.22rem .55rem;background:rgba(123,94,167,.8);color:#fff;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(3,3,8,.95);z-index:900;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s;backdrop-filter:blur(12px);}
.lightbox.open{opacity:1;pointer-events:all;}
.lb-inner{max-width:1100px;width:92%;display:grid;grid-template-columns:1.4fr 1fr;gap:2rem;align-items:start;animation:lightboxIn .4s ease;}
.lb-img{width:100%;max-height:82vh;object-fit:contain;filter:none;}
.lb-info{padding:1rem 0;}
.lb-movement{font-family:'Josefin Sans',sans-serif;font-size:.54rem;letter-spacing:.28em;text-transform:uppercase;color:var(--violet-l);}
.lb-title{font-family:'Playfair Display SC',serif;font-size:2rem;color:var(--cream);margin:.5rem 0 .2rem;line-height:1.2;}
.lb-artist{font-family:'Josefin Sans',sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
.lb-year{font-family:'Josefin Sans',sans-serif;font-size:.58rem;letter-spacing:.15em;color:var(--muted);margin-top:.2rem;}
.lb-desc{font-size:.95rem;font-style:italic;color:rgba(240,234,214,.55);line-height:1.8;margin-top:1rem;}
.lb-close{position:fixed;top:1.5rem;right:1.5rem;width:44px;height:44px;border:1px solid rgba(201,168,76,.3);background:rgba(6,6,10,.8);color:var(--gold);font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;}
.lb-close:hover{background:var(--gold);color:var(--bg);}
.lb-nav{display:flex;gap:1rem;margin-top:1.5rem;}
.lb-nav-btn{font-family:'Josefin Sans',sans-serif;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;padding:.5rem 1.2rem;border:1px solid rgba(201,168,76,.25);color:var(--muted);background:transparent;transition:all .25s;}
.lb-nav-btn:hover{border-color:var(--gold);color:var(--gold);}

/* NO RESULTS */
.no-results{text-align:center;padding:6rem 2rem;color:var(--muted);font-family:'Playfair Display SC',serif;font-size:1.4rem;}

/* FOOTER */
footer{background:#03030a;border-top:1px solid rgba(201,168,76,.1);padding:2.5rem 4rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.footer-logo{font-family:'Playfair Display SC',serif;font-size:1rem;letter-spacing:.38em;color:var(--gold);}
.footer-links-row{display:flex;gap:1.5rem;flex-wrap:wrap;}
.footer-links-row a{font-family:'Josefin Sans',sans-serif;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);transition:color .25s;}.footer-links-row a:hover{color:var(--gold);}
.footer-copy{font-family:'Josefin Sans',sans-serif;font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:#2a2420;}

@media(max-width:1024px){
  nav{padding:0 1.8rem;}.nav-cta{display:none;}.nav-hamburger{display:flex;}.nav-studio-mobile{display:block;}
  .nav-links{position:fixed;top:0;right:-100%;width:280px;height:100vh;background:rgba(10,9,14,.98);backdrop-filter:blur(16px);flex-direction:column;padding:5rem 2rem 2rem;gap:0;border-left:1px solid rgba(201,168,76,.15);z-index:495;transition:right .35s var(--ease);align-items:flex-start;}.nav-links.open{right:0;}
  .nav-links li{width:100%;border-bottom:1px solid rgba(201,168,76,.08);}.nav-links a{display:block;padding:.9rem 0;}
  .gallery-grid{grid-template-columns:repeat(3,1fr);padding:2rem;}
  .gallery-grid.masonry{columns:3;}
  .gallery-top{padding:1rem 2rem;}.page-hero{padding:9rem 2rem 4rem;}
  .lb-inner{grid-template-columns:1fr;}.lb-img{max-height:50vh;}
}
@media(max-width:640px){
  :root{--nav:52px;}nav{padding:0 1.2rem;}
  .page-hero{padding:7.5rem 1.2rem 3rem;}.gallery-top{padding:.8rem 1.2rem;gap:.5rem;}
  .gallery-search{min-width:100%;}
  .gallery-grid{grid-template-columns:1fr 1fr;padding:1.2rem;gap:.8rem;}
  .gallery-grid.masonry{columns:2;}
  .gallery-grid:not(.masonry) .gallery-item img{height:180px;}
  footer{padding:2rem 1.2rem;flex-direction:column;align-items:flex-start;}
}
@media(hover:none){.gallery-item-overlay{opacity:1;background:linear-gradient(to top,rgba(6,6,10,.85) 0%,transparent 45%);}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Luminary <span>Atelier</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="artists.html">Artists</a></li>
    <li><a href="gallery.html" class="active">Gallery</a></li>
    <li><a href="learn.html">Learn</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="howto.html">How to Use</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li class="nav-studio-mobile"><a href="studio.html">Studio</a></li>
  </ul>
  <a href="studio.html" class="nav-cta">Open Studio →</a>
  <button class="nav-hamburger" id="navHamburger" onclick="toggleNav()" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>
<div class="nav-overlay" id="navOverlay" onclick="closeNav()"></div>

<div class="page-hero">
  <div class="page-hero-bg"></div>
  <p class="section-label" style="position:relative;z-index:2;">The Collection</p>
  <div class="gold-line"></div>
  <h1>Gallery</h1>
  <p class="sub">120+ works spanning five centuries — search, filter, and explore.</p>
</div>

<div class="gallery-top">
  <input class="gallery-search" type="text" placeholder="Search title, artist, year…" id="searchInput" oninput="applyFilters()">
  <button class="filter-chip active" data-f="all" onclick="setFilter(this)">All</button>
  <button class="filter-chip" data-f="renaissance" onclick="setFilter(this)">Renaissance</button>
  <button class="filter-chip" data-f="baroque" onclick="setFilter(this)">Baroque</button>
  <button class="filter-chip" data-f="impressionism" onclick="setFilter(this)">Impressionism</button>
  <button class="filter-chip" data-f="post-impressionism" onclick="setFilter(this)">Post-Imp.</button>
  <button class="filter-chip" data-f="art-nouveau" onclick="setFilter(this)">Art Nouveau</button>
  <button class="filter-chip" data-f="cubism" onclick="setFilter(this)">Cubism</button>
  <button class="filter-chip" data-f="surrealism" onclick="setFilter(this)">Surrealism</button>
  <button class="filter-chip" data-f="expressionism" onclick="setFilter(this)">Expressionism</button>
  <button class="filter-chip" data-f="abstract" onclick="setFilter(this)">Abstract</button>
  <button class="filter-chip" data-f="pop" onclick="setFilter(this)">Pop Art</button>
  <button class="filter-chip" data-f="contemporary" onclick="setFilter(this)">Contemporary</button>
  <span class="results-count" id="resultsCount"></span>
  <div class="view-btns">
    <button class="view-btn active" onclick="setView('grid',this)" title="Grid">⊞</button>
    <button class="view-btn" onclick="setView('masonry',this)" title="Masonry">⊟</button>
  </div>
</div>

<div class="gallery-grid" id="galleryGrid"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="handleLBClick(event)">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <div class="lb-inner">
    <img class="lb-img" id="lbImg" src="" alt="">
    <div class="lb-info">
      <p class="lb-movement" id="lbMovement"></p>
      <div class="gold-line"></div>
      <p class="lb-title" id="lbTitle"></p>
      <p class="lb-artist" id="lbArtist"></p>
      <p class="lb-year" id="lbYear"></p>
      <p class="lb-desc" id="lbDesc"></p>
      <div class="lb-nav">
        <button class="lb-nav-btn" onclick="navLB(-1)">← Previous</button>
        <button class="lb-nav-btn" onclick="navLB(1)">Next →</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">Luminary Atelier</div>
  <div class="footer-links-row"><a href="index.html">Home</a><a href="artists.html">Artists</a><a href="studio.html">Studio</a><a href="contact.html">Contact</a></div>
  <p class="footer-copy">© 2025 Luminary Atelier</p>
</footer>

<script>
function toggleNav(){document.getElementById('navLinks').classList.toggle('open');document.getElementById('navHamburger').classList.toggle('open');document.getElementById('navOverlay').classList.toggle('open');}
function closeNav(){['navLinks','navHamburger','navOverlay'].forEach(id=>document.getElementById(id).classList.remove('open'));}

const WORKS = [
  {title:'Starry Night',artist:'Van Gogh',year:1889,tag:'post-impressionism',seed:'gw1',desc:'One of van Gogh\'s most celebrated works, painted from the window of his asylum room.'},
  {title:'Water Lilies',artist:'Monet',year:1906,tag:'impressionism',seed:'gw2',desc:'Part of Monet\'s famous series depicting his flower garden at Giverny.'},
  {title:'The Kiss',artist:'Klimt',year:1907,tag:'art-nouveau',seed:'gw3',desc:'Klimt\'s most celebrated work, depicting a couple locked in an embrace amid a field of flowers.'},
  {title:'Guernica',artist:'Picasso',year:1937,tag:'cubism',seed:'gw4',desc:'A powerful anti-war statement depicting the bombing of Guernica during the Spanish Civil War.'},
  {title:'The Persistence of Memory',artist:'Dalí',year:1931,tag:'surrealism',seed:'gw5',desc:'Dalí\'s iconic melting clocks evoke the fluidity of time in a dreamlike Catalan landscape.'},
  {title:'Mona Lisa',artist:'Da Vinci',year:1517,tag:'renaissance',seed:'gw6',desc:'The world\'s most famous portrait, known for the subject\'s enigmatic expression.'},
  {title:'The Scream',artist:'Munch',year:1893,tag:'expressionism',seed:'gw7',desc:'An expression of existential angst — the central figure screams against a turbulent sky.'},
  {title:'Girl with a Pearl Earring',artist:'Vermeer',year:1665,tag:'baroque',seed:'gw8',desc:'Often called the Dutch Mona Lisa, this portrait is celebrated for its luminous quality.'},
  {title:'The Night Watch',artist:'Rembrandt',year:1642,tag:'baroque',seed:'gw9',desc:'Rembrandt\'s largest and most ambitious work, depicting a group of city guards.'},
  {title:'Sunflowers',artist:'Van Gogh',year:1888,tag:'post-impressionism',seed:'gw10',desc:'A series celebrating the warmth and vitality of sunflowers in a simple vase.'},
  {title:'The Creation of Adam',artist:'Michelangelo',year:1512,tag:'renaissance',seed:'gw11',desc:'The most famous section of the Sistine Chapel ceiling, depicting God giving life to Adam.'},
  {title:'Les Demoiselles d\'Avignon',artist:'Picasso',year:1907,tag:'cubism',seed:'gw12',desc:'A groundbreaking proto-Cubist work that shattered pictorial conventions.'},
  {title:'Number 31',artist:'Pollock',year:1950,tag:'abstract',seed:'gw13',desc:'A monumental drip painting demonstrating Pollock\'s all-over compositional approach.'},
  {title:'Campbell\'s Soup Cans',artist:'Warhol',year:1962,tag:'pop',seed:'gw14',desc:'Warhol\'s iconic series blurred the line between fine art and commercial imagery.'},
  {title:'The Two Fridas',artist:'Kahlo',year:1939,tag:'surrealism',seed:'gw15',desc:'A double self-portrait exploring duality of identity and emotional vulnerability.'},
  {title:'Infinity Mirrored Room',artist:'Kusama',year:2013,tag:'contemporary',seed:'gw16',desc:'An immersive installation creating the illusion of infinite reflections.'},
  {title:'Mont Sainte-Victoire',artist:'Cézanne',year:1904,tag:'post-impressionism',seed:'gw17',desc:'One of over 60 paintings Cézanne made of this mountain near his home in Provence.'},
  {title:'Luncheon of the Boating Party',artist:'Renoir',year:1882,tag:'impressionism',seed:'gw18',desc:'A joyful scene of friends gathered on the terrace of Maison Fournaise restaurant.'},
  {title:'School of Athens',artist:'Raphael',year:1511,tag:'renaissance',seed:'gw19',desc:'A fresco depicting the greatest philosophers of antiquity gathered in an idealised space.'},
  {title:'The Kiss (Rodin)',artist:'Rodin',year:1882,tag:'contemporary',seed:'gw20',desc:'Rodin\'s marble sculpture depicts the tragic lovers Paolo and Francesca.'},
  {title:'Haystacks',artist:'Monet',year:1891,tag:'impressionism',seed:'gw21',desc:'A series exploring how changing light transforms even ordinary rural subjects.'},
  {title:'Dream Caused by a Bee',artist:'Dalí',year:1944,tag:'surrealism',seed:'gw22',desc:'A meditation on the boundary between sleeping and waking states.'},
  {title:'Self-Portrait with Thorn Necklace',artist:'Kahlo',year:1940,tag:'surrealism',seed:'gw23',desc:'Kahlo depicts herself with a thorn necklace and symbolic animals around her.'},
  {title:'Blue Poles',artist:'Pollock',year:1952,tag:'abstract',seed:'gw24',desc:'One of Pollock\'s most complex drip paintings, acquired by Australia for record sum.'},
  {title:'Marilyn Diptych',artist:'Warhol',year:1962,tag:'pop',seed:'gw25',desc:'Created weeks after Monroe\'s death, exploring fame, mortality, and reproduction.'},
  {title:'Portrait of Dr. Gachet',artist:'Van Gogh',year:1890,tag:'post-impressionism',seed:'gw26',desc:'One of the most expensive paintings ever sold, depicting Van Gogh\'s physician.'},
  {title:'Las Meninas',artist:'Velázquez',year:1656,tag:'baroque',seed:'gw27',desc:'A complex composition that questions the nature of representation and viewing.'},
  {title:'The Birth of Venus',artist:'Botticelli',year:1485,tag:'renaissance',seed:'gw28',desc:'The goddess of love emerges from the sea on a giant shell in this iconic mythological work.'},
  {title:'The Great Wave',artist:'Hokusai',year:1831,tag:'contemporary',seed:'gw29',desc:'Japan\'s most internationally recognised artwork — a towering wave dwarfs Mount Fuji.'},
  {title:'No. 61 Rust and Blue',artist:'Rothko',year:1953,tag:'abstract',seed:'gw30',desc:'Rothko\'s colour field paintings evoke deep emotional and spiritual experience.'},
  {title:'Lavender Mist',artist:'Pollock',year:1950,tag:'abstract',seed:'gw31',desc:'A masterpiece of the drip technique in silvery lavender tones.'},
  {title:'The Card Players',artist:'Cézanne',year:1895,tag:'post-impressionism',seed:'gw32',desc:'One of Cézanne\'s most celebrated works — the most expensive painting ever sold at private sale.'},
];

let activeFilter='all';
let activeSearch='';
let viewMode='grid';
let currentLBIndex=0;
let filteredWorks=[];

function getFiltered(){
  return WORKS.filter(w=>{
    const matchF=activeFilter==='all'||w.tag===activeFilter;
    const s=activeSearch.toLowerCase();
    const matchS=!s||w.title.toLowerCase().includes(s)||w.artist.toLowerCase().includes(s)||String(w.year).includes(s);
    return matchF&&matchS;
  });
}

function renderGallery(){
  filteredWorks=getFiltered();
  const grid=document.getElementById('galleryGrid');
  document.getElementById('resultsCount').textContent=`${filteredWorks.length} work${filteredWorks.length!==1?'s':''}`;
  if(!filteredWorks.length){grid.innerHTML='<div class="no-results">No works found</div>';return;}
  grid.innerHTML=filteredWorks.map((w,i)=>`
    <div class="gallery-item rev-s" style="animation-delay:${(i%4)*.06}s" onclick="openLB(${i})">
      <img src="https://picsum.photos/seed/${w.seed}/500/260" alt="${w.title}" loading="lazy">
      <div class="gi-badge">${w.tag.replace('-',' ')}</div>
      <div class="gallery-item-overlay">
        <p class="gi-title">${w.title}</p>
        <p class="gi-artist">${w.artist}</p>
        <p class="gi-year">${w.year}</p>
      </div>
    </div>
  `).join('');
  setTimeout(()=>{
    const io=new IntersectionObserver(en=>{en.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.06});
    document.querySelectorAll('.rev-s:not(.in)').forEach(el=>io.observe(el));
  },30);
}

function setFilter(btn){
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');activeFilter=btn.dataset.f;applyFilters();
}
function applyFilters(){activeSearch=document.getElementById('searchInput').value;renderGallery();}
function setView(v,btn){
  viewMode=v;document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  const grid=document.getElementById('galleryGrid');
  if(v==='masonry'){grid.classList.add('masonry');}else{grid.classList.remove('masonry');}
}

function openLB(idx){
  currentLBIndex=idx;
  const w=filteredWorks[idx];
  document.getElementById('lbImg').src=`https://picsum.photos/seed/${w.seed}-lb/900/650`;
  document.getElementById('lbTitle').textContent=w.title;
  document.getElementById('lbArtist').textContent=w.artist;
  document.getElementById('lbYear').textContent=w.year;
  document.getElementById('lbMovement').textContent=w.tag.replace(/-/g,' ');
  document.getElementById('lbDesc').textContent=w.desc;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLB(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
function handleLBClick(e){if(e.target===document.getElementById('lightbox'))closeLB();}
function navLB(dir){
  currentLBIndex=(currentLBIndex+dir+filteredWorks.length)%filteredWorks.length;
  openLB(currentLBIndex);
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('lightbox').classList.contains('open')){
    if(e.key==='Escape')closeLB();
    if(e.key==='ArrowLeft')navLB(-1);
    if(e.key==='ArrowRight')navLB(1);
  }
});

renderGallery();
</script>
</body>
</html>
